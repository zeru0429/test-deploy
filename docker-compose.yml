services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 5678:5678
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mydb
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "bunx prisma db push && bun run dev"
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - 5433:5432
